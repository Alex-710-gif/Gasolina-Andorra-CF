<script>
/* ---------- Firebase ---------- */
var CONFIGURED = window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.projectId &&
  window.FIREBASE_CONFIG.projectId.indexOf("PEGA_AQUI") === -1;
var fdb = null;
if (CONFIGURED) {
  try { firebase.initializeApp(window.FIREBASE_CONFIG); fdb = firebase.firestore(); }
  catch (e) { console.error(e); }
}
var memE = [], memR = {}, memB = 0, memCb = null;
var DB = {
  subscribeEntries: function (cb) {
    if (fdb) { return fdb.collection("entries").onSnapshot(function (s) { cb(s.docs.map(function (d) { return d.data(); })); }, function () { cb([]); }); }
    memCb = cb; cb(memE.slice()); return function () {};
  },
  subscribeBudget: function (cb) {
    if (fdb) { return fdb.collection("config").doc("season").onSnapshot(function (d) { cb(d.exists ? (Number(d.data().budget) || 0) : 0); }, function () { cb(0); }); }
    cb(memB); return function () {};
  },
  setEntry: function (e) { if (fdb) return fdb.collection("entries").doc(e.id).set(e); var i = memE.findIndex(function (x) { return x.id === e.id; }); if (i >= 0) memE[i] = e; else memE.push(e); if (memCb) memCb(memE.slice()); return Promise.resolve(); },
  deleteEntry: function (id) { if (fdb) { return fdb.collection("entries").doc(id).delete().then(function () { return fdb.collection("receipts").doc(id).delete().catch(function(){}); }); } var i = memE.findIndex(function (x) { return x.id === id; }); if (i >= 0) memE.splice(i, 1); delete memR[id]; if (memCb) memCb(memE.slice()); return Promise.resolve(); },
  setReceipt: function (id, d) { if (fdb) return fdb.collection("receipts").doc(id).set({ data: d }); memR[id] = d; return Promise.resolve(); },
  deleteReceipt: function (id) { if (fdb) return fdb.collection("receipts").doc(id).delete().catch(function(){}); delete memR[id]; return Promise.resolve(); },
  getReceipt: function (id) { if (fdb) return fdb.collection("receipts").doc(id).get().then(function (d) { return d.exists ? d.data().data : null; }); return Promise.resolve(memR[id] || null); },
  setBudget: function (v) { var n = Number(v) || 0; if (fdb) return fdb.collection("config").doc("season").set({ budget: n }); memB = n; return Promise.resolve(); }
};

/* ---------- Perfil local ---------- */
var PK = "andorracf_profile";
function loadProfile(){ try{ var r=localStorage.getItem(PK); return r?JSON.parse(r):null; }catch(e){ return null; } }
function storeProfile(p){ try{ localStorage.setItem(PK, JSON.stringify(p)); }catch(e){} }
function clearProfile(){ try{ localStorage.removeItem(PK); }catch(e){} }

/* ---------- Utils ---------- */
function eur(n){ return new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR"}).format(n||0); }
function num(n,d){ if(d===undefined)d=2; return new Intl.NumberFormat("es-ES",{minimumFractionDigits:0,maximumFractionDigits:d}).format(n||0); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ try{ return new Date(iso+"T00:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"}); }catch(e){ return iso; } }
function monthKey(iso){ return (iso||"").slice(0,7); }
function monthLabel(mk){ try{ return new Date(mk+"-01T00:00:00").toLocaleDateString("es-ES",{month:"long",year:"numeric"}); }catch(e){ return mk; } }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function slugify(s){ return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"jugador"; }
function pct(a,b){ return b>0?Math.round(a/b*100):0; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }

function exportCSV(entries, filename){
  var rows=[["Jugador","Estación","Viaje","Importe (€)","Litros","€/L","Fecha","Albarán"]];
  entries.forEach(function(e){ rows.push([e.player, STATIONS[e.station]?STATIONS[e.station].label:e.station, e.trip, num(e.euros), e.liters?num(e.liters):"", e.liters?num(e.euros/e.liters):"", e.date, e.hasReceipt?"Sí":"No"]); });
  var tE=entries.reduce(function(s,e){return s+e.euros;},0), tL=entries.reduce(function(s,e){return s+(e.liters||0);},0);
  rows.push(["TOTAL","","",num(tE),tL?num(tL):"","","",""]);
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(";");}).join("\n");
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
}
function compressImage(file){
  return new Promise(function(resolve,reject){
    var rd=new FileReader();
    rd.onload=function(){ var img=new Image(); img.onload=function(){
      var w=img.width,h=img.height,sc=Math.min(1,1100/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
      var c=document.createElement("canvas"); c.width=w; c.height=h; var x=c.getContext("2d");
      x.fillStyle="#fff"; x.fillRect(0,0,w,h); x.drawImage(img,0,0,w,h); resolve(c.toDataURL("image/jpeg",0.62));
    }; img.onerror=reject; img.src=rd.result; }; rd.onerror=reject; rd.readAsDataURL(file);
  });
}

function ic(n,size){ if(!size)size=18; return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||"")+'</svg>'; }
function crest(size){ if(!size)size=34; return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100" fill="none"><path d="M16 26 H84 L50 82 Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><g fill="currentColor"><g transform="rotate(-36 50 50)"><rect x="47" y="31" width="6" height="25" rx="2.5"/><rect x="40" y="26" width="20" height="9" rx="2.5"/></g><g transform="rotate(36 50 50)"><rect x="47" y="31" width="6" height="25" rx="2.5"/><rect x="40" y="26" width="20" height="9" rx="2.5"/></g><path d="M42 60 H58 V66 Q58 74 50 78 Q42 74 42 66 Z"/></g></svg>'; }

function polar(cx,cy,r,deg){ var a=(deg-180)*Math.PI/180; return {x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}; }
function arcPath(cx,cy,r,s0,e0){ var s=polar(cx,cy,r,e0),e=polar(cx,cy,r,s0),large=e0-s0<=180?0:1; return "M "+s.x+" "+s.y+" A "+r+" "+r+" 0 "+large+" 0 "+e.x+" "+e.y; }
function gauge(total,budget){
  var frac=budget>0?Math.min(total/budget,1):0.62, end=180*frac, over=budget>0&&total>budget;
  var ticks=[0,45,90,135,180].map(function(t){var a=polar(110,116,92,t),b=polar(110,116,80,t);return '<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" class="gauge-tick"/>';}).join("");
  return '<div class="gauge"><svg viewBox="0 0 220 130" width="100%" height="100%"><path d="'+arcPath(110,116,92,0,180)+'" class="gauge-track"/><path d="'+arcPath(110,116,92,0,end)+'" class="gauge-fill" style="stroke:'+(over?"var(--club)":"var(--moeve)")+'"/>'+ticks+'</svg><div class="gauge-center"><span class="gauge-amount">'+eur(total)+'</span><span class="gauge-sub">'+(budget>0?"de "+eur(budget)+" de presupuesto":"gasto total del equipo")+'</span></div></div>';
}

      (m.month==="all"||monthKey(e.date)===m.month) &&
      (m.q.trim()===""||(e.player+" "+e.trip).toLowerCase().indexOf(m.q.toLowerCase())>=0);

function entryForm(){
  var f=tmp.form;
  var stations=Object.keys(STATIONS).map(function(k){var s=STATIONS[k];var on=f.station===k;var sty=on?'style="border-color:'+s.color+';background:'+s.color+'"':"";return '<button class="station-pick '+(on?"on":"")+'" '+sty+' data-act="station" data-st="'+k+'">'+ic("fuel",20)+'<b>'+s.label+'</b></button>';}).join("");
  var showR=(f.img&&!f.removeImage)||(f.hadReceipt&&!f.removeImage);
  var receipt;
  if(showR){ receipt='<div class="receipt-preview">'+(f.img?'<img src="'+f.img+'" alt="Albarán">':'<div class="receipt-kept">'+ic("paperclip",16)+' Albarán adjunto</div>')+'<button class="ghost" style="color:var(--club)" data-act="rm-img">'+ic("x",14)+' Quitar</button></div>'; }
  else { receipt='<button class="upload" data-act="pick-file">'+ic("camera",20)+' Hacer foto o subir imagen</button>'; }
  return '<div class="form-head"><button class="icon-btn" data-act="cancel-form">'+ic("arrowleft",18)+'</button><h2>'+(state.editing?"Editar repostaje":"Nuevo repostaje")+'</h2></div>'+
    '<span class="field-label">Gasolinera</span><div class="station-grid">'+stations+'</div>'+
    '<label class="field"><span>Viaje</span><input id="f-trip" class="inp" placeholder="Ej.: Andorra → Zaragoza, partido liga" value="'+esc(f.trip)+'"></label>'+
    '<div class="field-row"><label class="field"><span>Importe (€)</span><input id="f-euros" class="inp big-num" inputmode="decimal" placeholder="0,00" value="'+esc(f.euros)+'"></label>'+
    '<label class="field"><span>Litros <small>(opcional)</small></span><input id="f-liters" class="inp big-num" inputmode="decimal" placeholder="—" value="'+esc(f.liters)+'"></label></div>'+
    '<label class="field"><span>Fecha</span><input id="f-date" class="inp" type="date" max="'+today()+'" value="'+esc(f.date)+'"></label>'+
    '<span class="field-label">Albarán / ticket</span><input id="f-file" type="file" accept="image/*" capture="environment" style="display:none">'+receipt+
    '<div id="f-err"></div><div class="form-actions"><button class="btn-ghost" data-act="cancel-form">Cancelar</button>'+
    '<button class="btn-primary big" data-act="save-entry">'+ic("check",16)+' '+(state.editing?"Guardar cambios":"Guardar repostaje")+'</button></div>';
}

function settingsScreen(){
  var s=tmp.settings;
  var budgetField=(s.role==="manager")?'<label class="field"><span>Presupuesto de temporada <small>(opcional)</small></span><input id="set-budget" class="inp big-num" inputmode="decimal" placeholder="Ej.: 3000" value="'+esc(s.budget)+'"></label>':"";
  return '<div class="form-head"><button class="icon-btn" data-act="back">'+ic("arrowleft",18)+'</button><h2>Ajustes</h2></div>'+
    '<label class="field"><span>Nombre</span><input id="set-name" class="inp" value="'+esc(s.name)+'"></label>'+
    '<span class="field-label">Rol</span><div class="role-grid">'+
    '<button class="role sm '+(s.role==="player"?"on":"")+'" data-act="set-role" data-role="player">'+ic("fuel",18)+'<b>Jugador</b></button>'+
    '<button class="role sm '+(s.role==="manager"?"on":"")+'" data-act="set-role" data-role="manager">'+ic("gauge",18)+'<b>Responsable</b></button></div>'+budgetField+
    '<div class="form-actions"><button class="btn-primary big" data-act="save-settings">'+ic("check",16)+' Guardar</button></div>'+
    '<button class="btn-text danger" data-act="reset">'+ic("logout",15)+' Cambiar de usuario en este móvil</button>';
}

/* ---------- Acciones ---------- */
function flash(msg){ var d=document.createElement("div"); d.className="toast"; d.innerHTML=ic("check",15)+" "+esc(msg); document.body.appendChild(d); setTimeout(function(){d.remove();},2600); }
function saveProfile(p){ state.profile=p; storeProfile(p); if(p.role==="manager") state.unlocked=true; }
function readForm(){ if(state.screen!=="form")return; var g=function(id){var e=document.getElementById(id);return e?e.value:undefined;}; var f=tmp.form; var v;
  v=g("f-trip"); if(v!==undefined)f.trip=v; v=g("f-euros"); if(v!==undefined)f.euros=v; v=g("f-liters"); if(v!==undefined)f.liters=v; v=g("f-date"); if(v!==undefined)f.date=v; }
function openForm(entry){ state.editing=entry; tmp.form=entry?{station:entry.station,trip:entry.trip,euros:String(entry.euros),liters:entry.liters?String(entry.liters):"",date:entry.date,img:null,removeImage:false,hadReceipt:!!entry.hasReceipt,createdAt:entry.createdAt,id:entry.id}:{station:"",trip:"",euros:"",liters:"",date:today(),img:null,removeImage:false,hadReceipt:false}; state.screen="form"; render(); }
function saveEntry(){
  readForm(); var f=tmp.form, err=document.getElementById("f-err");
  if(!f.station){ if(err)err.innerHTML='<p class="err">Elige la gasolinera.</p>'; return; }
  if(!f.euros||Number(f.euros.replace(",","."))<=0){ if(err)err.innerHTML='<p class="err">Pon el importe en euros.</p>'; return; }
  var id=f.id||uid();
  var entry={ id:id, player:state.profile.name, station:f.station, trip:(f.trip||"").trim(),
    euros:Number(String(f.euros).replace(",","."))||0, liters:f.liters?(Number(String(f.liters).replace(",","."))||null):null,
    date:f.date, createdAt:f.createdAt||Date.now(), hasReceipt:f.removeImage?false:(f.img?true:!!f.hadReceipt) };
  DB.setEntry(entry).then(function(){
    var ops=[]; if(f.img)ops.push(DB.setReceipt(id,f.img)); if(f.removeImage)ops.push(DB.deleteReceipt(id));
    return Promise.all(ops);
  }).then(function(){ flash(f.id?"Repostaje actualizado":"Repostaje guardado"); state.screen="home"; state.editing=null; if(!fdb)render(); });
  if(fdb){ state.screen="home"; state.editing=null; render(); }
}
function openReceipt(entry){
  var host=document.getElementById("modal-host");
  host.innerHTML='<div class="modal" data-act="close-viewer"><div class="modal-inner" data-act="noop"><div class="modal-head"><b>Albarán · '+esc(entry.player)+'</b><button class="icon-btn" data-act="close-viewer">'+ic("x",18)+'</button></div><div class="modal-body"><div class="receipt-loading">'+ic("receipt",28)+' Cargando…</div></div></div></div>';
  DB.getReceipt(entry.id).then(function(src){
    var b=host.querySelector(".modal-body"); if(!b)return;
    b.innerHTML=src?'<img src="'+src+'" alt="Albarán">':'<div class="receipt-loading">No se encontró la imagen.</div>';
  });
}
function closeViewer(){ document.getElementById("modal-host").innerHTML=""; }

function pinPush(d){
  if(tmp.pin.length>=6)return; tmp.pin+=d; render();
  if(tmp.pin.length===6){
    if(tmp.pin===MANAGER_PIN){ var purpose=state.pinPurpose; tmp.pin=""; setTimeout(function(){ pinSuccess(purpose); },160); }
    else { setTimeout(function(){ state.pinErr=true; tmp.pin=""; render(); setTimeout(function(){ state.pinErr=false; render(); },500); },160); }
  }
}
function pinSuccess(purpose){
  if(purpose==="lock"){ state.unlocked=true; state.pinPurpose=null; render(); }
  else if(purpose==="onboard"){ state.pinPurpose=null; saveProfile({name:tmp.name,role:"manager"}); render(); }
  else if(purpose==="settings"){ state.pinPurpose=null; applySettings(); }
}
function applySettings(){
  var s=tmp.settings;
  saveProfile({name:(s.name||"").trim()||state.profile.name, role:s.role});
  var done=function(){ state.screen="home"; render(); };
  if(s.role==="manager"){ DB.setBudget(s.budget).then(done); if(fdb)done(); } else done();
}

/* ---------- Eventos ---------- */
function onClick(e){
  var t=e.target.closest("[data-act]"); if(!t)return; var a=t.getAttribute("data-act");
  var id=t.getAttribute("data-id"), getE=function(){ return state.entries.filter(function(x){return x.id===id;})[0]; };
  if(a==="noop")return;
  if(a==="role"){ var nm=document.getElementById("ob-name"); if(nm)tmp.name=nm.value; tmp.role=t.getAttribute("data-role"); render(); }
  else if(a==="ob-continue"){ var n=document.getElementById("ob-name"); tmp.name=n?n.value:tmp.name; if((tmp.name||"").trim().length<2){ if(n)n.focus(); return; } if(tmp.role==="manager"){ tmp.pin=""; state.pinPurpose="onboard"; render(); } else { saveProfile({name:tmp.name.trim(),role:"player"}); render(); } }
  else if(a==="pin-d"){ pinPush(t.getAttribute("data-d")); }
  else if(a==="pin-back"){ tmp.pin=tmp.pin.slice(0,-1); render(); }
  else if(a==="pin-cancel"){ tmp.pin=""; state.pinPurpose=null; render(); }
  else if(a==="switch-user"){ clearProfile(); state.profile=null; state.unlocked=false; state.pinPurpose=null; tmp.pin=""; render(); }
  else if(a==="add"){ openForm(null); }
  else if(a==="edit"){ openForm(getE()); }
  else if(a==="cancel-form"){ state.screen="home"; state.editing=null; render(); }
  else if(a==="station"){ readForm(); tmp.form.station=t.getAttribute("data-st"); render(); }
  else if(a==="pick-file"){ var fi=document.getElementById("f-file"); if(fi)fi.click(); }
  else if(a==="rm-img"){ readForm(); tmp.form.img=null; tmp.form.removeImage=true; render(); }
  else if(a==="save-entry"){ saveEntry(); }
  else if(a==="receipt"){ openReceipt(getE()); }
  else if(a==="del"){ state.confirmDelete=id; render(); }
  else if(a==="del-cancel"){ state.confirmDelete=null; render(); }
  else if(a==="del-ok"){ var en=getE(); state.confirmDelete=null; DB.deleteEntry(id).then(function(){ flash("Repostaje eliminado"); if(!fdb)render(); }); if(fdb)render(); }
  else if(a==="open-settings"){ tmp.settings={name:state.profile.name,role:state.profile.role,budget:state.budget?String(state.budget):""}; state.screen="settings"; render(); }
  else if(a==="set-role"){ var sn=document.getElementById("set-name"); if(sn)tmp.settings.name=sn.value; var sb=document.getElementById("set-budget"); if(sb)tmp.settings.budget=sb.value; tmp.settings.role=t.getAttribute("data-role"); render(); }
  else if(a==="save-settings"){ var sn2=document.getElementById("set-name"); if(sn2)tmp.settings.name=sn2.value; var sb2=document.getElementById("set-budget"); if(sb2)tmp.settings.budget=sb2.value; if(tmp.settings.role==="manager"&&state.profile.role!=="manager"){ tmp.pin=""; state.pinPurpose="settings"; render(); } else { applySettings(); } }
  else if(a==="reset"){ clearProfile(); state.profile=null; state.unlocked=false; render(); }
  else if(a==="back"){ state.screen="home"; state.mgr.selectedPlayer=null; render(); }
  else if(a==="tab"){ state.mgr.tab=t.getAttribute("data-tab"); render(); }
  else if(a==="chip"){ state.mgr.station=t.getAttribute("data-st"); render(); }
  else if(a==="player"){ state.mgr.selectedPlayer=t.getAttribute("data-player"); render(); }
  else if(a==="export"){ exportCSV(filteredMgr(),"repostajes-andorracf.csv"); flash("CSV exportado"); }
  else if(a==="export-player"){ var pl=t.getAttribute("data-player"); exportCSV(state.entries.filter(function(x){return x.player===pl;}),"repostajes-"+slugify(pl)+".csv"); flash("CSV exportado"); }
  else if(a==="close-viewer"){ closeViewer(); }
}
function onPickFile(e){
  var f=e.target.files&&e.target.files[0]; if(!f)return;
  readForm();
  compressImage(f).then(function(d){ tmp.form.img=d; tmp.form.removeImage=false; render(); }).catch(function(){ var er=document.getElementById("f-err"); if(er)er.innerHTML='<p class="err">No se pudo procesar la imagen.</p>'; });
}
function wire(){
  var file=document.getElementById("f-file"); if(file)file.addEventListener("change",onPickFile);
  ["f-trip","f-euros","f-liters","f-date"].forEach(function(id){var el=document.getElementById(id); if(el)el.addEventListener("input",readForm);});
  var ms=document.getElementById("mgr-month"); if(ms)ms.addEventListener("change",function(ev){ state.mgr.month=ev.target.value; render(); });
  var sr=document.getElementById("mgr-search"); if(sr)sr.addEventListener("input",function(ev){ state.mgr.q=ev.target.value; var dl=document.getElementById("dyn-list"); if(dl)dl.innerHTML=mgrListInner(); });
}

/* ---------- Arranque ---------- */
document.body.addEventListener("click",onClick);
DB.subscribeEntries(function(list){
  list.sort(function(a,b){ return a.date<b.date?1:a.date>b.date?-1:(b.createdAt||0)-(a.createdAt||0); });
  state.entries=list; state.loading=false; render();
});
DB.subscribeBudget(function(b){ state.budget=b; if(state.profile&&state.profile.role==="manager"&&state.unlocked)render(); });
render();
</script>
</body>
</html>
