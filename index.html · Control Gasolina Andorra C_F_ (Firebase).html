<div id="root"></div>

<!-- React + Babel (para compilar el JSX en el navegador, sin instalar nada) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ---------- Firebase / capa de datos ---------- */
const CONFIGURED = window.FIREBASE_CONFIG &&
  window.FIREBASE_CONFIG.projectId &&
  window.FIREBASE_CONFIG.projectId.indexOf("PEGA_AQUI") === -1;

let fdb = null;
if (CONFIGURED) {
  try { firebase.initializeApp(window.FIREBASE_CONFIG); fdb = firebase.firestore(); }
  catch (e) { console.error("Firebase init:", e); }
}

/* Respaldo en memoria para el modo demo (sin claves) */
const memEntries = [];
let memBudget = 0;
const memReceipts = {};
const demoListeners = new Set();
const notifyDemo = () => demoListeners.forEach((f) => f([...memEntries]));

const DB = {
  subscribeEntries(cb) {
    if (fdb) {
      return fdb.collection("entries").onSnapshot((snap) => {
        cb(snap.docs.map((d) => d.data()));
      }, (err) => { console.error(err); cb([]); });
    }
    demoListeners.add(cb); cb([...memEntries]);
    return () => demoListeners.delete(cb);
  },
  subscribeBudget(cb) {
    if (fdb) {
      return fdb.collection("config").doc("season").onSnapshot((doc) => {
        cb(doc.exists ? Number(doc.data().budget) || 0 : 0);
      }, () => cb(0));
    }
    cb(memBudget); return () => {};
  },
  async setEntry(entry) {
    if (fdb) return fdb.collection("entries").doc(entry.id).set(entry);
    const i = memEntries.findIndex((e) => e.id === entry.id);
    if (i >= 0) memEntries[i] = entry; else memEntries.push(entry);
    notifyDemo();
  },
  async deleteEntry(id) {
    if (fdb) {
      await fdb.collection("entries").doc(id).delete();
      try { await fdb.collection("receipts").doc(id).delete(); } catch {}
      return;
    }
    const i = memEntries.findIndex((e) => e.id === id);
    if (i >= 0) memEntries.splice(i, 1);
    delete memReceipts[id]; notifyDemo();
  },
  async setReceipt(id, dataUrl) {
    if (fdb) return fdb.collection("receipts").doc(id).set({ data: dataUrl });
    memReceipts[id] = dataUrl;
  },
  async deleteReceipt(id) {
    if (fdb) { try { return await fdb.collection("receipts").doc(id).delete(); } catch {} return; }
    delete memReceipts[id];
  },
  async getReceipt(id) {
    if (fdb) {
      const doc = await fdb.collection("receipts").doc(id).get();
      return doc.exists ? doc.data().data : null;
    }
    return memReceipts[id] || null;
  },
  async setBudget(v) {
    const n = Number(v) || 0;
    if (fdb) return fdb.collection("config").doc("season").set({ budget: n });
    memBudget = n;
  },
};

function exportEntriesCSV(entries, filename) {
  const rows = [["Jugador", "Estación", "Viaje", "Importe (€)", "Litros", "€/L", "Fecha", "Albarán"]];
  entries.forEach((e) => rows.push([
    e.player, STATIONS[e.station] ? STATIONS[e.station].label : e.station, e.trip,
    num(e.euros), e.liters ? num(e.liters) : "", e.liters ? num(e.euros / e.liters) : "",
    e.date, e.hasReceipt ? "Sí" : "No",
  ]));
  const totE = entries.reduce((s, e) => s + e.euros, 0);
  const totL = entries.reduce((s, e) => s + (e.liters || 0), 0);
  rows.push(["TOTAL", "", "", num(totE), totL ? num(totL) : "", "", "", ""]);
  const csv = rows.map((r) => r.map((c) => '"' + String(c).replace(/"/g, '""') + '"').join(";")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}

function compressImage(file, maxDim = 1100, quality = 0.62) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new window.Image();
      img.onload = () => {
        let { width, height } = img;
        const scale = Math.min(1, maxDim / Math.max(width, height));
        width = Math.round(width * scale); height = Math.round(height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject; img.src = reader.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

/* ---------- Gauge ---------- */
function polar(cx, cy, r, deg) { const a = ((deg - 180) * Math.PI) / 180; return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }; }
function arcPath(cx, cy, r, s0, e0) {
  const s = polar(cx, cy, r, e0), e = polar(cx, cy, r, s0);
  const large = e0 - s0 <= 180 ? 0 : 1;
  return "M " + s.x + " " + s.y + " A " + r + " " + r + " 0 " + large + " 0 " + e.x + " " + e.y;
}
function FuelGauge({ total, budget }) {
  const frac = budget > 0 ? Math.min(total / budget, 1) : 0.62;
  const end = 180 * frac;
  const over = budget > 0 && total > budget;
  return (
    <div className="gauge">
      <svg viewBox="0 0 220 130" width="100%" height="100%">
        <path d={arcPath(110, 116, 92, 0, 180)} className="gauge-track" />
        <path d={arcPath(110, 116, 92, 0, end)} className="gauge-fill" style={{ stroke: over ? "var(--club)" : "var(--moeve)" }} />
        {[0, 45, 90, 135, 180].map((t) => {
          const a = polar(110, 116, 92, t), b = polar(110, 116, 80, t);
          return <line key={t} x1={a.x} y1={a.y} x2={b.x} y2={b.y} className="gauge-tick" />;
        })}
      </svg>
      <div className="gauge-center">
        <span className="gauge-amount">{eur(total)}</span>
        <span className="gauge-sub">{budget > 0 ? "de " + eur(budget) + " de presupuesto" : "gasto total del equipo"}</span>
      </div>
    </div>
  );
}

function PinGate({ title, sub, onSuccess, footer }) {
  const [pin, setPin] = useState(""); const [error, setError] = useState(false);

      if (next === MANAGER_PIN) setTimeout(onSuccess, 160);
      else setTimeout(() => { setError(true); setPin(""); setTimeout(() => setError(false), 500); }, 160);
    }
  };
  return (
    <div className="pin-screen">
      <div className="crest"><Ic n="gauge" size={24} /></div>
      <h1 className="pin-title">{title}</h1>
      <p className="pin-sub">{sub}</p>
      <PinPad value={pin} onPush={push} onBack={() => setPin((p) => p.slice(0, -1))} error={error} />
      {footer}
    </div>
  );
}

    const m = {};
    filtered.forEach((e) => {
      m[e.player] = m[e.player] || { player: e.player, euros: 0, liters: 0, count: 0, repsol: 0, moeve: 0 };
      m[e.player].euros += e.euros; m[e.player].liters += e.liters || 0; m[e.player].count += 1; m[e.player][e.station] += e.euros;
    });
    return Object.values(m).sort((a, b) => b.euros - a.euros);
  }, [filtered]);

  if (loading) return <div className="screen"><Skeleton big /></div>;
  if (selectedPlayer) {
    const list = entries.filter((e) => e.player === selectedPlayer);
    return <PlayerDetail player={selectedPlayer} entries={list} onBack={() => setSelectedPlayer(null)}
      onReceipt={onReceipt} onDelete={onDelete} flash={flash} />;
  }
  return (
    <div className="screen">
      <div className="dash-top">
        <FuelGauge total={totals.euros} budget={budget} />
        <div className="dash-stats">
          <Stat k="Repostajes" v={totals.count} />
          <Stat k="Litros" v={num(totals.liters)} />
          <Stat k="Repsol" v={eur(totals.repsol)} dot="var(--repsol)" />
          <Stat k="Moeve" v={eur(totals.moeve)} dot="var(--moeve)" />
        </div>
      </div>
      <div className="filters">
        <div className="search"><Ic n="search" size={15} />
          <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Buscar jugador o viaje…" /></div>
        <div className="chips">
          <Chip on={station === "all"} onClick={() => setStation("all")}>Todas</Chip>
          <Chip on={station === "repsol"} onClick={() => setStation("repsol")} color="var(--repsol)">Repsol</Chip>
          <Chip on={station === "moeve"} onClick={() => setStation("moeve")} color="var(--moeve)">Moeve</Chip>
          <div className="grow" />
          <div className="select-wrap"><Ic n="calendar" size={14} />
            <select value={month} onChange={(e) => setMonth(e.target.value)}>
              <option value="all">Todo</option>
              {months.map((m) => <option key={m} value={m}>{monthLabel(m)}</option>)}
            </select><Ic n="chevrondown" size={14} /></div>
        </div>
      </div>
      <div className="tabs">
        <button className={tab === "entries" ? "on" : ""} onClick={() => setTab("entries")}><Ic n="receipt" size={15} /> Repostajes</button>
        <button className={tab === "players" ? "on" : ""} onClick={() => setTab("players")}><Ic n="users" size={15} /> Por jugador</button>
        <button className="export" onClick={() => { exportEntriesCSV(filtered, "repostajes-andorracf.csv"); flash("CSV exportado"); }}><Ic n="download" size={15} /> CSV</button>
      </div>
      {tab === "entries" ? (
        filtered.length === 0 ? <EmptyState who="manager" /> : (
          <div className="list">
            {filtered.map((e) => <EntryCard key={e.id} entry={e} showPlayer onDelete={() => onDelete(e)} onReceipt={() => onReceipt(e)} />)}
          </div>
        )
      ) : (
        <div className="list">
          {byPlayer.map((p) => (
            <button key={p.player} className="player-row" onClick={() => setSelectedPlayer(p.player)}>
              <div className="player-avatar">{p.player.slice(0, 1).toUpperCase()}</div>
              <div className="player-info">
                <b>{p.player}</b>
                <span>{p.count} repostajes · {num(p.liters)} L</span>
                <div className="split">
                  <i style={{ width: pct(p.repsol, p.euros) + "%", background: "var(--repsol)" }} />
                  <i style={{ width: pct(p.moeve, p.euros) + "%", background: "var(--moeve)" }} />
                </div>
              </div>
              <div className="player-total">{eur(p.euros)}</div>
              <span className="player-chev"><Ic n="chevronright" size={18} /></span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function PlayerDetail({ player, entries, onBack, onReceipt, onDelete, flash }) {
  const t = entries.reduce((a, e) => { a.euros += e.euros; a.liters += e.liters || 0; a[e.station] += e.euros; return a; },
    { euros: 0, liters: 0, repsol: 0, moeve: 0 });
  return (
    <div className="screen">
      <div className="detail-head">
        <button className="icon-btn" onClick={onBack} aria-label="Volver"><Ic n="arrowleft" /></button>
        <div className="player-avatar lg">{player.slice(0, 1).toUpperCase()}</div>
        <div className="detail-title"><b>{player}</b><span>{entries.length} repostajes · {num(t.liters)} L</span></div>
        <div className="detail-total">{eur(t.euros)}</div>
      </div>
      <div className="detail-split">
        <div className="ds-item"><i className="dot" style={{ background: "var(--repsol)" }} /> Repsol <b>{eur(t.repsol)}</b></div>
        <div className="ds-item"><i className="dot" style={{ background: "var(--moeve)" }} /> Moeve <b>{eur(t.moeve)}</b></div>
      </div>
      {entries.length > 0 && (
        <button className="detail-export" onClick={() => { exportEntriesCSV(entries, "repostajes-" + slugify(player) + ".csv"); flash && flash("CSV exportado"); }}>
          <Ic n="download" size={15} /> Exportar repostajes de {player.split(" ")[0]} a CSV</button>
      )}
      {entries.length === 0 ? <EmptyState who="manager" /> : (
        <div className="list">
          {entries.map((e) => <EntryCard key={e.id} entry={e} showPlayer={false} onDelete={() => onDelete(e)} onReceipt={() => onReceipt(e)} />)}
        </div>
      )}
    </div>
  );
}

function Stat({ k, v, dot }) {
  return (<div className="stat">
    <span className="stat-k">{dot && <i className="dot" style={{ background: dot }} />}{k}</span>
    <span className="stat-v">{v}</span></div>);
}
function Chip({ children, on, onClick, color }) {
  return (<button className={"chip " + (on ? "on" : "")} onClick={onClick}
    style={on && color ? { background: color, borderColor: color, color: "#fff" } : undefined}>
    {color && <i className="dot" style={{ background: on ? "#fff" : color }} />}{children}</button>);
}

function EntryCard({ entry, showPlayer, onEdit, onDelete, onReceipt }) {
  const [confirm, setConfirm] = useState(false);
  const st = STATIONS[entry.station] || { label: entry.station, color: "var(--muted)" };
  return (
    <div className="card">
      <div className="card-rail" style={{ background: st.color }} />
      <div className="card-body">
        <div className="card-top">
          <span className="station" style={{ color: st.color }}><Ic n="fuel" size={13} /> {st.label}</span>
          <span className="card-date">{fmtDate(entry.date)}</span>
        </div>
        <div className="card-trip">
          {showPlayer && <b className="card-player">{entry.player}</b>}
          <span className="trip-text">{entry.trip || <em>Sin descripción del viaje</em>}</span>
        </div>
        <div className="card-foot">
          <div className="amount">{eur(entry.euros)}</div>
          <div className="card-meta">{entry.liters ? <span>{num(entry.liters)} L · {eur(entry.euros / entry.liters)}/L</span> : null}</div>
          <div className="card-actions">
            {entry.hasReceipt && <button className="ghost" onClick={onReceipt}><Ic n="paperclip" size={14} /> Albarán</button>}
            {onEdit && <button className="icon-btn sm" onClick={onEdit} aria-label="Editar"><Ic n="pencil" size={15} /></button>}
            {!confirm ? (
              <button className="icon-btn sm danger" onClick={() => setConfirm(true)} aria-label="Eliminar"><Ic n="trash" size={15} /></button>
            ) : (
              <>
                <button className="icon-btn sm" onClick={() => setConfirm(false)}><Ic n="x" size={15} /></button>
                <button className="icon-btn sm danger solid" onClick={onDelete}><Ic n="check" size={15} /></button>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function EntryForm({ initial, onCancel, onSave }) {
  const [station, setStation] = useState(initial ? initial.station : "");
  const [trip, setTrip] = useState(initial ? initial.trip : "");
  const [euros, setEuros] = useState(initial && initial.euros ? String(initial.euros) : "");
  const [liters, setLiters] = useState(initial && initial.liters ? String(initial.liters) : "");
  const [date, setDate] = useState(initial ? initial.date : today());
  const [imgData, setImgData] = useState(null);
  const [hadReceipt] = useState(!!(initial && initial.hasReceipt));
  const [removeImage, setRemoveImage] = useState(false);
  const [busy, setBusy] = useState(false); const [err, setErr] = useState("");
  const fileRef = useRef(null);

  const pickImage = async (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    setBusy(true);
    try { const d = await compressImage(f); setImgData(d); setRemoveImage(false); }
    catch { setErr("No se pudo procesar la imagen."); }
    setBusy(false);
  };
  const submit = () => {
    if (!station) return setErr("Elige la gasolinera.");
    if (!euros || Number(euros) <= 0) return setErr("Pon el importe en euros.");
    setErr("");
    onSave({ id: initial && initial.id, station, trip, euros, liters, date,
      createdAt: initial && initial.createdAt, hasReceipt: hadReceipt }, imgData, removeImage);
  };
  const showReceipt = (imgData && !removeImage) || (hadReceipt && !removeImage);

  return (
    <div className="screen form">
      <div className="form-head">
        <button className="icon-btn" onClick={onCancel} aria-label="Volver"><Ic n="arrowleft" /></button>
        <h2>{initial ? "Editar repostaje" : "Nuevo repostaje"}</h2>
      </div>
      <span className="field-label">Gasolinera</span>
      <div className="station-grid">
        {Object.entries(STATIONS).map(([key, s]) => (
          <button key={key} className={"station-pick " + (station === key ? "on" : "")}
            style={station === key ? { borderColor: s.color, background: s.color } : undefined}
            onClick={() => setStation(key)}><Ic n="fuel" size={20} /><b>{s.label}</b></button>
        ))}
      </div>
      <label className="field"><span>Viaje</span>
        <input className="inp" value={trip} onChange={(e) => setTrip(e.target.value)} placeholder="Ej.: Andorra → Zaragoza, partido liga" /></label>
      <div className="field-row">
        <label className="field"><span>Importe (€)</span>
          <input className="inp big-num" inputMode="decimal" value={euros}
            onChange={(e) => setEuros(e.target.value.replace(",", "."))} placeholder="0,00" /></label>
        <label className="field"><span>Litros <small>(opcional)</small></span>
          <input className="inp big-num" inputMode="decimal" value={liters}
            onChange={(e) => setLiters(e.target.value.replace(",", "."))} placeholder="—" /></label>
      </div>
      <label className="field"><span>Fecha</span>
        <input className="inp" type="date" value={date} max={today()} onChange={(e) => setDate(e.target.value)} /></label>
      <span className="field-label">Albarán / ticket</span>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" hidden onChange={pickImage} />
      {showReceipt ? (
        <div className="receipt-preview">
          {imgData ? <img src={imgData} alt="Albarán" /> : <div className="receipt-kept"><Ic n="paperclip" size={16} /> Albarán adjunto</div>}
          <button className="ghost danger" onClick={() => { setImgData(null); setRemoveImage(true); }}><Ic n="x" size={14} /> Quitar</button>
        </div>
      ) : (
        <button className="upload" onClick={() => fileRef.current && fileRef.current.click()} disabled={busy}>
          <Ic n="camera" size={20} /> {busy ? "Procesando…" : "Hacer foto o subir imagen"}</button>
      )}
      {err && <p className="err">{err}</p>}
      <div className="form-actions">
        <button className="btn-ghost" onClick={onCancel}>Cancelar</button>
        <button className="btn-primary big" onClick={submit} disabled={busy}><Ic n="check" size={16} /> {initial ? "Guardar cambios" : "Guardar repostaje"}</button>
      </div>
    </div>
  );
}

function SettingsScreen({ profile, budget, isManager, onBack, onSaveProfile, onSaveBudget, onReset }) {
  const [name, setName] = useState(profile.name);
  const [role, setRole] = useState(profile.role);
  const [b, setB] = useState(budget ? String(budget) : "");
  const [pinStep, setPinStep] = useState(false);
  const doSave = async () => {
    onSaveProfile({ name: name.trim() || profile.name, role });
    if (role === "manager" || isManager) await onSaveBudget(b);
    onBack();
  };
  const handleSave = () => { if (role === "manager" && profile.role !== "manager") setPinStep(true); else doSave(); };
  if (pinStep) return (
    <div className="screen form">
      <PinGate title="Confirma el PIN" sub="Necesario para entrar como responsable"
        onSuccess={() => { setPinStep(false); doSave(); }}
        footer={<button className="btn-text" onClick={() => setPinStep(false)}><Ic n="arrowleft" size={15} /> Cancelar</button>} />
    </div>
  );
  return (
    <div className="screen form">
      <div className="form-head"><button className="icon-btn" onClick={onBack} aria-label="Volver"><Ic n="arrowleft" /></button><h2>Ajustes</h2></div>
      <label className="field"><span>Nombre</span><input className="inp" value={name} onChange={(e) => setName(e.target.value)} /></label>
      <span className="field-label">Rol</span>
      <div className="role-grid">
        <button className={"role sm " + (role === "player" ? "on" : "")} onClick={() => setRole("player")}><Ic n="fuel" size={18} /><b>Jugador</b></button>
        <button className={"role sm " + (role === "manager" ? "on" : "")} onClick={() => setRole("manager")}><Ic n="gauge" size={18} /><b>Responsable</b></button>
      </div>
      {(role === "manager" || isManager) && (
        <label className="field"><span>Presupuesto de temporada <small>(opcional, para el medidor)</small></span>
          <input className="inp big-num" inputMode="decimal" value={b} onChange={(e) => setB(e.target.value.replace(",", "."))} placeholder="Ej.: 3000" /></label>
      )}
      <div className="form-actions"><button className="btn-primary big" onClick={handleSave}><Ic n="check" size={16} /> Guardar</button></div>
      <button className="btn-text danger" onClick={onReset}><Ic n="logout" size={15} /> Cambiar de usuario en este móvil</button>
    </div>
  );
}

function ReceiptViewer({ viewer, onClose }) {
  return (
    <div className="modal" onClick={onClose}>
      <div className="modal-inner" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head"><b>Albarán · {viewer.entry && viewer.entry.player}</b>
          <button className="icon-btn" onClick={onClose}><Ic n="x" /></button></div>
        <div className="modal-body">
          {viewer.loading ? <div className="receipt-loading"><Ic n="receipt" size={28} /> Cargando…</div>
            : viewer.src ? <img src={viewer.src} alt="Albarán" />
              : <div className="receipt-loading">No se encontró la imagen.</div>}
        </div>
      </div>
    </div>
  );
}

function EmptyState({ onAdd, who }) {
  return (
    <div className="empty">
      <div className="empty-ic"><Ic n="receipt" size={26} /></div>
      {who === "player" ? (
        <><b>Aún no has apuntado nada</b>
          <p>Cada vez que repostes, añade el viaje, el importe y la foto del albarán.</p>
          {onAdd && <button className="btn-primary" onClick={onAdd}><Ic n="plus" size={16} /> Añadir repostaje</button>}</>
      ) : (
        <><b>Sin repostajes todavía</b>
          <p>Cuando los jugadores empiecen a apuntar, los verás aquí. Prueba a cambiar los filtros.</p></>
      )}
    </div>
  );
}
function Skeleton({ big }) {
  return (<div className="list">{big && <div className="sk sk-big" />}{[0, 1, 2].map((i) => <div key={i} className="sk" />)}</div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
